<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pinboard</title>
  <link href="styles/style.css" rel="stylesheet">
</head>

<body>

  <!-- HEADER -->
  <header>
    <h1>Pin<span>board</span></h1>
    <input type="search" placeholder="Search pins..." id="searchInput">
    <a href="pages/signin.html" id="btn-login" class="btn-login-link">Sign in</a>
    <button id="logoutBtn" class="btn-logout" onclick="logout()">Logout</button>
  </header>

  <!-- MAIN -->
  <main>
    <div class="filter-bar">
      <select id="filterSelect">
        <option value="all">All</option>
        <option value="travel">Travel</option>
        <option value="design">Design</option>
        <option value="nature">Nature</option>
      </select>
    </div>
    <div class="grid" id="grid">
    </div>
  </main>
  <script src="scripts/cards.js"></script>
  <script src="scripts/search.js"></script>
  <script src="scripts/signin.js"></script>
  <script src="scripts/filter.js"></script>
</body>

</html>
